<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Jaanu 🌹</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Lora:ital,wght@0,400;0,500;1,400&family=Allura&display=swap" rel="stylesheet">
<style>
  :root{
    --plum:#2a0e1e;
    --rose:#c75d7a;
    --gold:#d8a857;
    --cream:#f6e9dd;
    --blush:#f1d4d9;
    --ink:#3a1620;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:'Lora',serif;
    background:var(--plum);
    color:var(--ink);
    overflow:hidden;
    position:relative;
  }

  /* ---------- floating petals layer ---------- */
  #petals{
    position:fixed; inset:0; pointer-events:none; z-index:5; overflow:hidden;
  }
  .petal{
    position:absolute; top:-40px; font-size:22px; opacity:.85;
    animation:fall linear infinite, sway ease-in-out infinite;
    filter: drop-shadow(0 2px 2px rgba(0,0,0,.15));
  }
  @keyframes fall{
    to{ transform: translateY(110vh); }
  }
  @keyframes sway{
    0%,100%{ margin-left:0; }
    50%{ margin-left:40px; }
  }

  /* ---------- app shell ---------- */
  #app{
    position:relative; z-index:2;
    width:100%; height:100%;
    display:flex; align-items:center; justify-content:center;
    padding:24px;
  }

  .page{
    display:none;
    width:100%; max-width:760px;
    max-height:92vh;
    overflow-y:auto;
    background: var(--page-bg, var(--cream));
    border:1px solid var(--page-border, rgba(255,255,255,.4));
    border-radius:18px;
    padding:42px 46px 36px;
    position:relative;
    box-shadow: 0 30px 80px rgba(0,0,0,.45), inset 0 0 0 8px rgba(255,255,255,.18);
    animation: riseIn .7s ease both;
  }
  .page.active{ display:block; }

  @keyframes riseIn{
    from{ opacity:0; transform: translateY(24px) scale(.98); }
    to{ opacity:1; transform: translateY(0) scale(1); }
  }

  /* corner ornaments */
  .page::before, .page::after{
    content:"❀";
    position:absolute;
    font-size:20px;
    color: var(--page-accent, var(--rose));
    opacity:.6;
  }
  .page::before{ top:14px; left:18px; }
  .page::after{ bottom:14px; right:18px; transform: rotate(180deg); }

  .eyebrow{
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    letter-spacing:.12em;
    text-transform:uppercase;
    font-size:13px;
    color: var(--page-accent, var(--rose));
    margin:0 0 6px;
    text-align:center;
  }

  h1.title{
    font-family:'Allura', cursive;
    font-size:54px;
    line-height:1;
    text-align:center;
    margin:0 0 18px;
    color: var(--page-title, var(--ink));
  }

  .emoji-row{
    text-align:center;
    font-size:22px;
    letter-spacing:6px;
    margin-bottom:18px;
    opacity:.9;
  }

  .letter-text{
    font-size:18px;
    line-height:1.85;
    white-space:pre-line;
  }

  .shayari{
    margin:26px 0;
    padding:18px 22px;
    border-left:3px solid var(--page-accent, var(--rose));
    background: rgba(255,255,255,.35);
    border-radius: 6px;
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    font-size:21px;
    line-height:1.7;
    white-space:pre-line;
  }

  /* ---------- photo frame ---------- */
  .photo-frame{
    width:100%;
    aspect-ratio:16/9;
    margin: 24px 0 8px;
    border-radius:10px;
    border:6px solid var(--page-accent, var(--gold));
    box-shadow: 0 10px 26px rgba(0,0,0,.25);
    background:
      repeating-linear-gradient(45deg, rgba(255,255,255,.5) 0 10px, rgba(255,255,255,.25) 10px 20px);
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
    position:relative;
  }
  .photo-frame img{
    width:100%; height:100%; object-fit:cover; display:block;
  }
  .photo-frame .placeholder{
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    color: rgba(58,22,32,.55);
    font-size:15px;
    text-align:center;
    padding:0 20px;
  }

  /* ---------- blank "write your own" page ---------- */
  .blank-letter{
    min-height:280px;
    border:2px dashed var(--page-accent, var(--rose));
    border-radius:10px;
    margin-top:22px;
    background: repeating-linear-gradient(
      to bottom, transparent, transparent 38px, rgba(58,22,32,.12) 39px
    );
    position:relative;
  }
  .blank-letter span{
    position:absolute; top:14px; left:18px;
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    color: rgba(58,22,32,.45);
    font-size:14px;
  }

  /* ---------- nav ---------- */
  .nav-row{
    display:flex; justify-content:space-between; align-items:center;
    margin-top:30px;
  }
  .btn{
    font-family:'Lora',serif;
    font-size:14px;
    letter-spacing:.04em;
    border:1px solid var(--page-accent, var(--rose));
    background:transparent;
    color: var(--ink);
    padding:9px 18px;
    border-radius:30px;
    cursor:pointer;
    transition: all .25s ease;
  }
  .btn:hover{ background: var(--page-accent, var(--rose)); color:#fff; }
  .btn:disabled{ opacity:.25; cursor:default; pointer-events:none; }

  .dots{
    display:flex; gap:7px;
  }
  .dot{
    width:7px; height:7px; border-radius:50%;
    background: rgba(58,22,32,.25);
    cursor:pointer;
    transition: all .25s ease;
  }
  .dot.active{ background: var(--page-accent, var(--rose)); transform: scale(1.4); }

  ::-webkit-scrollbar{ width:6px; }
  ::-webkit-scrollbar-thumb{ background: rgba(0,0,0,.2); border-radius:4px; }

  @media (max-width:600px){
    .page{ padding:30px 22px 26px; }
    h1.title{ font-size:42px; }
    .letter-text, .shayari{ font-size:16px; }
  }
</style>
</head>
<body>

<div id="petals"></div>
<div id="app"></div>

    photo:true
  }
];

/* ============ RENDER ============ */
const app = document.getElementById('app');
let current = 0;

function buildPage(p, idx){
  const el = document.createElement('div');
  el.className = 'page';
  el.style.setProperty('--page-bg', p.bg);
  el.style.setProperty('--page-accent', p.accent);
  el.style.setProperty('--page-title', p.accent);

  let inner = `
    <div class="eyebrow">${p.eyebrow}</div>
    <h1 class="title">${p.title}</h1>
    <div class="emoji-row">${p.emojis}</div>
  `;

  if(p.blank){
    inner += `
      <p class="letter-text" style="text-align:center; opacity:.6; font-style:italic;">
        This page is just for the two of you — write it yourself 🤍
      </p>
      <div class="blank-letter"><span>Dear jaanu...</span></div>
    `;
  } else {
    inner += `
      <div class="letter-text">${p.text}</div>
      <div class="shayari">${p.shayari}</div>
    `;
    if(p.photo){
      inner += `
        <div class="photo-frame">
          <img src="images/${p.id}.jpg" alt="${p.title}"
               onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
          <div class="placeholder" style="display:none; flex-direction:column; align-items:center; justify-content:center; height:100%;">
            📷 Drop your photo here as<br><code>images/${p.id}.jpg</code>
          </div>
        </div>
      `;
    }
  }

  inner += `
    <div class="nav-row">
      <button class="btn" id="back-${idx}">← Back</button>
      <div class="dots">${pages.map((_,i)=>`<span class="dot ${i===idx?'active':''}" data-go="${i}"></span>`).join('')}</div>
      <button class="btn" id="next-${idx}">Next →</button>
    </div>
  `;

  el.innerHTML = inner;
  return el;
}

function render(){
  app.innerHTML = '';
  const el = buildPage(pages[current], current);
  app.appendChild(el);
  requestAnimationFrame(()=> el.classList.add('active'));

  const backBtn = el.querySelector(`#back-${current}`);
  const nextBtn = el.querySelector(`#next-${current}`);
  backBtn.disabled = current === 0;
  nextBtn.disabled = current === pages.length - 1;

  backBtn.onclick = () => { if(current>0){ current--; render(); } };
  nextBtn.onclick = () => { if(current<pages.length-1){ current++; render(); } };
  el.querySelectorAll('.dot').forEach(d=>{
    d.onclick = () => { current = parseInt(d.dataset.go); render(); };
  });

  document.body.style.background = p_bg_fallback(pages[current].accent);
}

function p_bg_fallback(hex){
  return `radial-gradient(circle at 30% 20%, ${hex}33, #2a0e1e 70%)`;
}

render();

/* ============ FLOATING PETALS ============ */
const petalEmojis = ['🌸','🌹','🌷','💮','🥀','🍃'];
const petalLayer = document.getElementById('petals');
function spawnPetal(){
  const p = document.createElement('div');
  p.className = 'petal';
  p.textContent = petalEmojis[Math.floor(Math.random()*petalEmojis.length)];
  p.style.left = Math.random()*100 + 'vw';
  const dur = 8 + Math.random()*10;
  p.style.animationDuration = dur + 's, ' + (2+Math.random()*2) + 's';
  p.style.fontSize = (14 + Math.random()*14) + 'px';
  petalLayer.appendChild(p);
  setTimeout(()=> p.remove(), dur*1000 + 500);
}
setInterval(spawnPetal, 600);
for(let i=0;i<8;i++) setTimeout(spawnPetal, i*200);
</script>
</body>
</html>
